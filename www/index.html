<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TheChemSolver</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #08020d;
    color: #f8fafc;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    text-align: center;
  }
  .mark {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, #f97316 0%, #a855f7 100%);
  }
  .status {
    color: #cbd5e1;
    font-size: 14px;
  }
  .spinner {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #f97316;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="mark"></div>
  <div class="spinner"></div>
  <div class="status" id="status">Loading TheChemSolver…</div>
  <script>
    // This shell is only shown if the native app cannot reach the live
    // server (server.url in capacitor.config.ts). Normal operation loads
    // the production site directly and never renders this page.
    window.addEventListener('offline', function () {
      document.getElementById('status').textContent =
        'You appear to be offline. Reconnect to continue.'
    })
  </script>
</body>
</html>
